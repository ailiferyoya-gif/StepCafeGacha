<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Walk Cafe Days</title>
  <meta name="description" content="歩数連動 × カフェ経営 × ガチャ収集育成ゲームのWebプロトタイプ">
  <link rel="stylesheet" href="styles.css?v=grid-fit-assets">
</head>
<body>
  <main class="game-shell" aria-label="Walk Cafe Days game screen">
    <section class="game-device">
      <header class="game-hud" aria-label="ゲームHUD">
        <div class="profile-chip">
          <img src="assets/staff/barista-mina.png" alt="店員ミナ" class="profile-avatar">
          <div>
            <span class="rank-tag">Cafe Lv. 12</span>
            <strong>Walk Cafe Days</strong>
          </div>
        </div>
        <button class="hud-command" id="collectIdle" type="button" aria-label="放置売上を回収">回収</button>
      </header>

      <section class="resource-bar" aria-label="所持リソース">
        <article><span>歩数</span><strong id="stepCount">4,820</strong></article>
        <article><span>コイン</span><strong id="coins">1,240</strong></article>
        <article><span>券</span><strong id="tickets">3</strong></article>
        <article><span>評判</span><strong id="reputation">42</strong></article>
      </section>

      <section class="play-screen" id="homeScreen" aria-label="カフェ内装編集">
        <div class="board-topline">
          <div>
            <span class="mode-label">内装編集</span>
            <h1>カフェ配置</h1>
          </div>
          <div class="board-stats" aria-label="営業予測">
            <span>売上 <strong id="forecastSales">2,180</strong></span>
            <span>効果 <strong id="decorBonus">+18%</strong></span>
          </div>
        </div>

        <div class="cafe-board-wrap">
          <div class="cafe-board" id="cafeBoard" aria-label="家具配置グリッド">
            <img src="assets/cafe-room-isometric.png" alt="箱庭風のカフェ店内" class="board-room">
            <div class="board-vignette"></div>
            <div class="grid-layer" id="gridLayer"></div>
            <div class="placed-layer" id="placedLayer"></div>
            <div class="board-badges">
              <span id="placementCount">0/18</span>
              <span id="layoutScore">満足度 0</span>
            </div>
            <p class="stage-log" id="salesLog">家具を選んでマスをタップすると、好きな位置に配置できます。</p>
          </div>
        </div>

        <section class="tool-panel" aria-label="内装ツール">
          <div class="tool-row">
            <button class="edit-tool active" id="placeMode" type="button">配置</button>
            <button class="edit-tool" id="removeMode" type="button">撤去</button>
            <button class="edit-tool" id="clearLayout" type="button">全撤去</button>
            <button class="edit-tool primary" id="presetButton" type="button">おまかせ</button>
          </div>
          <div class="palette" id="decorPalette" aria-label="家具パレット"></div>
        </section>
      </section>

      <section class="screen" id="stepsScreen" aria-label="歩数報酬">
        <div class="screen-title-row">
          <h2>今日の歩数報酬</h2>
          <button id="addSteps" type="button">+1,000歩</button>
        </div>
        <div class="reward-list" id="rewardList"></div>
      </section>

      <section class="screen" id="gachaScreen" aria-label="ガチャ">
        <div class="gacha-stage">
          <div class="gacha-card" id="gachaCard">
            <span class="rarity">?</span>
            <img src="assets/staff/barista-mina.png" alt="ガチャ排出キャラクター" class="gacha-portrait">
            <strong>スタッフガチャ</strong>
            <p>チケット1枚で仲間を迎える</p>
          </div>
          <button id="drawGacha" type="button">1回引く</button>
        </div>
      </section>

      <section class="screen" id="teamScreen" aria-label="スタッフ編成">
        <h2>スタッフ編成</h2>
        <div class="loadout" id="loadout"></div>
      </section>

      <section class="screen" id="upgradeScreen" aria-label="強化">
        <h2>設備強化</h2>
        <div class="upgrade-list" id="upgradeList"></div>
      </section>

      <nav class="bottom-nav" aria-label="画面切り替え">
        <button class="nav-item active" data-screen="home" type="button"><span>店内</span></button>
        <button class="nav-item" data-screen="steps" type="button"><span>歩数</span></button>
        <button class="nav-item" data-screen="gacha" type="button"><span>ガチャ</span></button>
        <button class="nav-item" data-screen="team" type="button"><span>編成</span></button>
        <button class="nav-item" data-screen="upgrade" type="button"><span>強化</span></button>
      </nav>
    </section>
  </main>
  <script src="app.js?v=grid-fit-assets"></script>
</body>
</html>
